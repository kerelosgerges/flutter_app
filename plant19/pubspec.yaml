name: Greensight
description: Plant Doctor App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  url_launcher: ^6.2.5
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  flutter_animate: ^4.5.0
  tflite_flutter: ^0.11.0        # ← تشغيل TFLite
  image: ^4.1.3                  # ← معالجة الصور
  image_picker: ^1.0.7            # ← المعرض
  camera: ^0.10.5+9               # ← الكاميرا
  path_provider: ^2.1.1           # ← مسارات الملفات
  permission_handler: ^11.0.1
  share_plus: ^13.0.0           # ← الأذونات
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
#  intl: ^0.18.0


  flutter_native_splash: any
dev_dependencies: 
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  mockito: ^5.4.4
  mocktail: ^1.0.3
  integration_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  test: ^1.24.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/models/
    - assets/labels.txt
    - assets/protocols.json
    - assets/weeds.json
    - assets/crop_encyclopedia.json
    - assets/crop_reminders.json
